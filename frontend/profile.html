<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #0d1117;
      --panel-2: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #238636;
      --accent-2: #2f81f7;
      --danger: #f85149;
      --success: #3fb950;
      --card-shadow: 0 18px 40px rgba(1, 4, 9, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(47, 129, 247, 0.11), transparent 32%),
        radial-gradient(circle at 90% 80%, rgba(63, 185, 80, 0.1), transparent 30%),
        var(--bg);
      padding: 18px;
    }

    .profile-shell {
      width: min(1240px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 20%), var(--panel);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #010409;
    }

    .brand {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 11px;
      font-size: 13px;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      padding: 20px;
    }

    .left-pane {
      padding-right: 6px;
    }

    .avatar {
      width: 100%;
      max-width: 296px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #21262d;
      object-fit: cover;
      display: block;
    }

    .username {
      margin: 14px 0 6px;
      font-size: 30px;
      line-height: 1.15;
      word-break: break-word;
    }

    .subtext {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .sidebar-meta {
      display: grid;
      gap: 7px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      color: #c9d1d9;
      font-size: 14px;
    }

    .edit-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .edit-btn:hover {
      background: #30363d;
    }

    .right-pane {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .section-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
    }

    .section-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-label {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .achievements-section {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: var(--panel-2);
    }

    .achievements-section h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .badges-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .achievement-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d1117;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 10px 16px;
      transition: transform 0.2s;
    }

    .achievement-badge:hover {
      transform: scale(1.03);
    }

    .achievement-badge .ach-icon {
      font-size: 24px;
      line-height: 1;
    }

    .ach-info .ach-name {
      font-size: 13px;
      font-weight: 800;
    }

    .ach-info .ach-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    .achievement-badge.locked {
      opacity: 0.35;
      filter: grayscale(1);
    }

    .streak-heatmap {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: var(--panel-2);
      display: grid;
      gap: 10px;
    }

    .streak-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .streak-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .streak-summary {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .streak-chart {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 8px;
      align-items: start;
    }

    .streak-weekdays {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
      padding-top: 19px;
    }

    .streak-weekdays span {
      line-height: 12px;
    }

    .streak-board {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
    }

    .streak-months {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 12px;
      gap: 3px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      min-width: max-content;
    }

    .streak-months span {
      white-space: nowrap;
    }

    .streak-grid {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(7, 12px);
      grid-auto-columns: 12px;
      gap: 3px;
      min-width: max-content;
    }

    .streak-cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(48, 54, 61, 0.65);
      background: #0b1622;
    }

    .streak-cell.l1 {
      background: #0e4429;
    }

    .streak-cell.l2 {
      background: #006d32;
    }

    .streak-cell.l3 {
      background: #26a641;
    }

    .streak-cell.l4 {
      background: #39d353;
    }

    .streak-legend {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(48, 54, 61, 0.65);
      background: #0b1622;
      display: inline-block;
    }

    .legend-cell.l1 {
      background: #0e4429;
    }

    .legend-cell.l2 {
      background: #006d32;
    }

    .legend-cell.l3 {
      background: #26a641;
    }

    .legend-cell.l4 {
      background: #39d353;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .edit-modal {
      position: fixed;
      inset: 0;
      background: rgba(1, 4, 9, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 40;
    }

    .edit-modal.show {
      display: flex;
    }

    .modal-card {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0d1117;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .modal-head {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .close-btn {
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .form {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: #c9d1d9;
      font-weight: 600;
    }

    input {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d1117;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 2px rgba(47, 129, 247, 0.2);
    }

    .image-preview {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      display: none;
      background: #21262d;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .save-btn {
      border: 1px solid #2ea043;
      background: #238636;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn:hover {
      background: #2ea043;
    }

    .logout-btn {
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-btn {
      border: 1px solid #da3633;
      background: rgba(248, 81, 73, 0.16);
      color: #ffb1ad;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: rgba(248, 81, 73, 0.28);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .left-pane {
        padding-right: 0;
      }

      .avatar {
        max-width: 160px;
      }

      .stats-row {
        grid-template-columns: 1fr 1fr;
      }

    }

    @media (max-width: 600px) {
      .stats-row {
        grid-template-columns: 1fr;
      }

      .streak-chart {
        grid-template-columns: 30px 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="profile-shell">
    <header class="topbar">
      <div class="brand">Player Profile</div>
      <div class="top-actions">
        <button class="top-btn" type="button" onclick="goDashboard()">Dashboard</button>
        <button class="top-btn" type="button" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="layout">
      <aside class="left-pane">
        <img id="avatar" class="avatar" src="" alt="Profile image">
        <h1 id="name" class="username">Loading...</h1>
        <p class="subtext">Overview and profile management</p>

        <button class="edit-btn" type="button" onclick="openEditModal()">Edit profile</button>

        <div class="sidebar-meta">
          <div id="email">Email: -</div>
          <div id="phone">Phone: -</div>
          <div id="age">Age: -</div>
        </div>
      </aside>

      <section class="right-pane">
        <div>
          <h2 class="section-title">Overview</h2>
          <p class="section-sub">Your activity and achievements in one place.</p>
        </div>

        <section class="stats-row">
          <article class="stat-card">
            <div id="gamesWonValue" class="stat-value">0</div>
            <div class="stat-label">Games Won</div>
          </article>
          <article class="stat-card">
            <div id="starsValue" class="stat-value">0</div>
            <div class="stat-label">Stars Earned</div>
          </article>
          <article class="stat-card">
            <div id="streakValue" class="stat-value">0</div>
            <div class="stat-label">Day Streak</div>
          </article>
          <article class="stat-card">
            <div id="badgeValue" class="stat-value">0</div>
            <div class="stat-label">Badges</div>
          </article>
        </section>

        <section class="achievements-section">
          <h3>Your Achievements</h3>
          <div id="achievementsGrid" class="badges-grid"></div>
        </section>

        <section class="streak-heatmap">
          <div class="streak-head">
            <h3>Streak Activity</h3>
            <p id="streakSummary" class="streak-summary">0 active days in the last year</p>
          </div>

          <div class="streak-chart">
            <div class="streak-weekdays" aria-hidden="true">
              <span></span>
              <span>Mon</span>
              <span></span>
              <span>Wed</span>
              <span></span>
              <span>Fri</span>
              <span></span>
            </div>

            <div class="streak-board">
              <div id="streakMonths" class="streak-months"></div>
              <div id="streakGrid" class="streak-grid" aria-label="Streak activity heatmap"></div>
            </div>
          </div>

          <div class="streak-legend" aria-hidden="true">
            <span>Less</span>
            <span class="legend-cell"></span>
            <span class="legend-cell l1"></span>
            <span class="legend-cell l2"></span>
            <span class="legend-cell l3"></span>
            <span class="legend-cell l4"></span>
            <span>More</span>
          </div>
        </section>

        <div id="status" class="status"></div>
      </section>
    </div>
  </main>

  <div id="editModal" class="edit-modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="editTitle">Update Profile</h3>
        <button class="close-btn" type="button" onclick="closeEditModal()">Close</button>
      </div>

      <form class="form" onsubmit="event.preventDefault(); updateProfile();">
        <div class="field">
          <label for="editName">Full Name</label>
          <input id="editName" type="text" placeholder="Enter name" required>
        </div>

        <div class="field">
          <label for="editPhone">Phone</label>
          <input id="editPhone" type="text" placeholder="Enter phone number" required>
        </div>

        <div class="field">
          <label for="editAge">Age</label>
          <input id="editAge" type="number" min="0" placeholder="Enter age">
        </div>

        <div class="field">
          <label for="editImage">Choose profile picture</label>
          <input
            id="editImage"
            type="file"
            accept="image/*"
            capture="environment"
          >
          <img id="editPreview" class="image-preview" alt="Selected profile image preview">
        </div>

        <div class="actions">
          <button id="saveBtn" class="save-btn" type="submit">Save Changes</button>
          <button class="reset-btn" type="button" onclick="resetProgress()">Reset Progress</button>
          <button class="logout-btn" type="button" onclick="logout()">Logout</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const XP_PER_LEVEL = 50;
    let selectedProfileImage = "";
    let currentProfileImage = "";

    function setStatus(message, type) {
      const status = document.getElementById("status");
      status.textContent = message || "";
      status.className = "status" + (type ? " " + type : "");
    }

    function toNumber(value, fallback) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function buildAchievements(level, streak, gamesWon, starsEarned) {
      return [
        {
          name: "Speed Runner",
          sub: "Finish 5 games fast",
          icon: "🚀",
          unlocked: gamesWon >= 5
        },
        {
          name: "Big Brain",
          sub: "100% on any quiz",
          icon: "🧠",
          unlocked: starsEarned >= 30
        },
        {
          name: "On Fire",
          sub: "7 streak",
          icon: "🔥",
          unlocked: streak >= 7
        },
        {
          name: "King/Queen",
          sub: "Reach Level 15",
          icon: "👑",
          unlocked: level >= 15
        },
        {
          name: "Diamond Star",
          sub: "500 stars total",
          icon: "💎",
          unlocked: starsEarned >= 500
        }
      ];
    }

    function renderAchievements(achievements) {
      const container = document.getElementById("achievementsGrid");
      container.innerHTML = "";

      achievements.forEach((achievement) => {
        const card = document.createElement("div");
        card.className = "achievement-badge" + (achievement.unlocked ? "" : " locked");
        card.innerHTML = `
          <span class="ach-icon">${achievement.icon}</span>
          <div class="ach-info">
            <div class="ach-name">${achievement.name}</div>
            <div class="ach-sub">${achievement.sub}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function getClientTimeZone() {
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
      } catch {
        return "UTC";
      }
    }

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function renderStreakHeatmap(streak, activityCounts) {
      const grid = document.getElementById("streakGrid");
      const months = document.getElementById("streakMonths");
      const summary = document.getElementById("streakSummary");
      const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const safeCounts = activityCounts && typeof activityCounts === "object" ? activityCounts : {};

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const start = new Date(today);
      start.setDate(start.getDate() - 364);
      while (start.getDay() !== 0) {
        start.setDate(start.getDate() - 1);
      }

      const dates = [];
      for (let cursor = new Date(start); cursor <= today; cursor.setDate(cursor.getDate() + 1)) {
        dates.push(new Date(cursor));
      }

      const streakDays = Math.min(Math.max(0, streak), dates.length);

      grid.innerHTML = "";
      let activeDays = 0;

      dates.forEach((date, index) => {
        const dateKey = toDateKey(date);
        const count = Math.max(0, Math.min(4, toNumber(safeCounts[dateKey], 0)));

        if (count > 0) activeDays++;

        const cell = document.createElement("span");
        cell.className = "streak-cell" + (count > 0 ? " l" + Math.min(4, count) : "");
        cell.title = date.toDateString() + ": " + count + " activity";
        grid.appendChild(cell);
      });

      const weekCount = Math.ceil(dates.length / 7);
      months.innerHTML = "";
      for (let week = 0; week < weekCount; week++) {
        const monthCell = document.createElement("span");
        const date = dates[week * 7];
        const prev = week > 0 ? dates[(week - 1) * 7] : null;
        monthCell.textContent = !prev || date.getMonth() !== prev.getMonth() ? monthNames[date.getMonth()] : "";
        months.appendChild(monthCell);
      }

      summary.textContent = streakDays + " day streak, " + activeDays + " active days in the last year";
    }

    function openEditModal() {
      document.getElementById("editModal").classList.add("show");
    }

    function closeEditModal() {
      document.getElementById("editModal").classList.remove("show");
      clearEditImageSelection(false);
    }

    function clearEditImageSelection(resetInput) {
      selectedProfileImage = "";
      const input = document.getElementById("editImage");
      const preview = document.getElementById("editPreview");
      if (resetInput) {
        input.value = "";
      }
      preview.removeAttribute("src");
      preview.style.display = "none";
    }

    function resizeImageToDataUrl(file, maxSize = 320, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const img = new Image();

          img.onload = () => {
            const longestSide = Math.max(img.width, img.height);
            const scale = longestSide > maxSize ? maxSize / longestSide : 1;
            const width = Math.max(1, Math.round(img.width * scale));
            const height = Math.max(1, Math.round(img.height * scale));

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");

            if (!ctx) {
              reject(new Error("Canvas not supported"));
              return;
            }

            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };

          img.onerror = () => reject(new Error("Invalid image file"));
          img.src = reader.result;
        };

        reader.onerror = () => reject(new Error("Could not read image"));
        reader.readAsDataURL(file);
      });
    }

    async function handleEditImageSelection(event) {
      const preview = document.getElementById("editPreview");
      const file = event.target.files && event.target.files[0];

      if (!file) {
        clearEditImageSelection(false);
        return;
      }

      if (!file.type.startsWith("image/")) {
        clearEditImageSelection(true);
        setStatus("Please choose a valid image file.", "error");
        return;
      }

      try {
        selectedProfileImage = await resizeImageToDataUrl(file);
        preview.src = selectedProfileImage;
        preview.style.display = "block";
        setStatus("", "");
      } catch (error) {
        clearEditImageSelection(true);
        setStatus("Could not process selected image.", "error");
      }
    }

    function applyProfile(data, progressData) {
      const xp = Math.max(0, toNumber(data.xp, 0));
      const level = Math.max(0, toNumber(data.level, Math.floor(xp / XP_PER_LEVEL)));
      const streak = Math.max(0, toNumber(data.streak, 0));
      const activityCounts = data.activityCounts && typeof data.activityCounts === "object"
        ? data.activityCounts
        : {};
      const logs = Array.isArray(progressData && progressData.logs) ? progressData.logs : [];
      const gamesWon = logs.length;
      const starsEarned = logs.reduce((sum, log) => sum + Math.max(0, toNumber(log && log.stars, 0)), 0);
      const achievements = buildAchievements(level, streak, gamesWon, starsEarned);
      const badgeCount = achievements.filter((achievement) => achievement.unlocked).length;
      currentProfileImage = data.profileImage || "https://via.placeholder.com/320";

      document.getElementById("avatar").src = currentProfileImage;
      document.getElementById("name").textContent = data.name || "User";
      document.getElementById("email").textContent = "Email: " + (data.email || "-");
      document.getElementById("phone").textContent = "Phone: " + (data.phone || "-");
      document.getElementById("age").textContent = "Age: " + (data.age ?? "-");
      document.getElementById("gamesWonValue").textContent = String(gamesWon);
      document.getElementById("starsValue").textContent = String(starsEarned);
      document.getElementById("streakValue").textContent = String(streak);
      document.getElementById("badgeValue").textContent = String(badgeCount);

      renderAchievements(achievements);
      renderStreakHeatmap(streak, activityCounts);

      document.getElementById("editName").value = data.name || "";
      document.getElementById("editPhone").value = data.phone || "";
      document.getElementById("editAge").value = data.age ?? "";
      clearEditImageSelection(true);
    }

    async function loadProfileData(showLoading) {
      if (showLoading) {
        setStatus("Loading profile...", "");
      }

      try {
        const dashboardRes = await fetch("/api/dashboard", {
          credentials: "include",
          cache: "no-store",
          headers: {
            "x-timezone": getClientTimeZone()
          }
        });

        if (dashboardRes.status === 401 || dashboardRes.status === 403) {
          window.location.href = "/auth";
          return;
        }
        if (!dashboardRes.ok) throw new Error("Failed to load profile");
        const dashboardData = await dashboardRes.json();

        let progressData = { primary: {}, logs: [] };
        const progressRes = await fetch("/api/games/primary/progress", {
          credentials: "include",
          cache: "no-store"
        });
        if (progressRes.status === 401 || progressRes.status === 403) {
          window.location.href = "/auth";
          return;
        }
        if (progressRes.ok) {
          progressData = await progressRes.json();
        }

        applyProfile(dashboardData, progressData);
        setStatus("", "");
      } catch (error) {
        setStatus(error.message || "Unable to load profile.", "error");
      }
    }

    loadProfileData(true);

    async function updateProfile() {
      const saveBtn = document.getElementById("saveBtn");
      const bodyData = {
        name: document.getElementById("editName").value.trim(),
        phone: document.getElementById("editPhone").value.trim(),
        age: document.getElementById("editAge").value.trim(),
        profileImage: selectedProfileImage || currentProfileImage
      };

      saveBtn.disabled = true;
      setStatus("Saving changes...", "");

      try {
        const res = await fetch("/api/auth/profile", {
          method: "PUT",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(bodyData)
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Update failed");
        }

        closeEditModal();
        await loadProfileData(false);
        setStatus("Profile updated successfully.", "success");
      } catch (error) {
        setStatus(error.message || "Something went wrong.", "error");
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function resetProgress() {
      const confirmed = window.confirm("Reset XP, all game logs, and all game levels? This cannot be undone.");
      if (!confirmed) return;

      setStatus("Resetting progress...", "");

      try {
        const res = await fetch("/api/auth/reset-progress", {
          method: "POST",
          credentials: "include"
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Reset failed");
        }

        await loadProfileData(false);
        setStatus("Progress reset. Your streak now starts fresh from today.", "success");
      } catch (error) {
        setStatus(error.message || "Could not reset progress.", "error");
      }
    }

    function goDashboard() {
      window.location.href = "/dashboard";
    }

    async function logout() {
      try {
        await fetch("/api/auth/logout", {
          method: "POST",
          credentials: "include"
        });
      } catch (error) {
      }
      window.location.href = "/auth";
    }

    document.getElementById("editImage").addEventListener("change", handleEditImageSelection);
    document.getElementById("editModal").addEventListener("click", (event) => {
      if (event.target.id === "editModal") {
        closeEditModal();
      }
    });
  </script>
</body>
</html>
