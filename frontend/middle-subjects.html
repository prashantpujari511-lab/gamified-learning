<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle Subjects</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #0b1220;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #263244;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(56, 189, 248, 0.13), transparent 32%),
        radial-gradient(circle at 92% 90%, rgba(52, 211, 153, 0.12), transparent 30%),
        var(--bg);
      padding: 16px;
    }

    .shell {
      width: min(1150px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 20%), var(--panel-2);
    }

    .top {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #0a0f1b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top h1 {
      margin: 0;
      font-size: 22px;
    }

    .top p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: #1f2937;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #273449;
    }

    .main {
      padding: 16px;
    }

    .subjects {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .subject-card {
      border: 1px solid var(--border);
      background: #0d1422;
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 8px;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .subject-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 10px 22px rgba(2, 6, 23, 0.28);
    }

    .subject-title {
      margin: 0;
      font-size: 17px;
    }

    .subject-sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .subject-cta {
      margin-top: 4px;
      color: #cfe8ff;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .subject-games {
      display: grid;
      gap: 6px;
    }

    .game-btn {
      text-align: left;
      border: 1px solid var(--border);
      background: #111b2a;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .game-btn:hover {
      border-color: var(--accent);
      background: #162338;
    }

    @media (max-width: 920px) {
      .subjects { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div>
        <h1>Middle School Subjects (5th-8th)</h1>
        <p>Select a subject, then choose one of its 3 games.</p>
      </div>
      <div class="top-actions">
        <button type="button" onclick="goDashboard()">Dashboard</button>
        <button type="button" onclick="goProfile()">Profile</button>
      </div>
    </header>

    <main class="main">
      <section id="subjects" class="subjects"></section>
    </main>
  </div>

  <script>
    const SUBJECTS = [
      {
        title: "Maths",
        sub: "Math logic, ratios, and problem-solving games.",
        games: [
          { name: "Math Logic Arena", path: "/middle-school-games?game=math_logic_arena" },
          { name: "Fraction Sprint", path: "/middle-school-games?game=fraction_sprint" },
          { name: "Ratio Race", path: "/middle-school-games?game=ratio_race" }
        ]
      },
      {
        title: "Science",
        sub: "Physics, chemistry, and biology quiz battles.",
        games: [
          { name: "Science Quiz Battle", path: "/middle-school-games?game=science_quiz_battle_arena" },
          { name: "Lab Challenge", path: "/middle-school-games?game=lab_challenge" },
          { name: "Bio Explorer", path: "/middle-school-games?game=bio_explorer" }
        ]
      },
      {
        title: "English",
        sub: "Grammar correction and language accuracy drills.",
        games: [
          { name: "Grammar Ninja", path: "/middle-school-games?game=grammar_ninja" },
          { name: "Sentence Fixer", path: "/middle-school-games?game=sentence_fixer" },
          { name: "Word Master", path: "/middle-school-games?game=word_master" }
        ]
      }
    ];

    function renderSubjects() {
      const root = document.getElementById("subjects");
      root.innerHTML = SUBJECTS.map((subject, idx) => `
        <article class="subject-card" data-idx="${idx}">
          <h2 class="subject-title">${subject.title}</h2>
          <p class="subject-sub">${subject.sub}</p>
          <div class="subject-cta">Subject Games</div>
          <div class="subject-games">
            ${subject.games.map((game, gameIdx) => `
              <button type="button" class="game-btn" data-subject-idx="${idx}" data-game-idx="${gameIdx}">
                ${game.name}
              </button>
            `).join("")}
          </div>
        </article>
      `).join("");

      root.querySelectorAll(".game-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const subjectIdx = Number(button.getAttribute("data-subject-idx"));
          const gameIdx = Number(button.getAttribute("data-game-idx"));
          const selected = SUBJECTS[subjectIdx] && SUBJECTS[subjectIdx].games[gameIdx];
          if (selected) window.location.href = selected.path;
        });
      });
    }

    function goDashboard() { window.location.href = "/dashboard"; }
    function goProfile() { window.location.href = "/profile"; }

    renderSubjects();
  </script>
</body>
</html>
