<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Middle Subjects</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #0b1220;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #263244;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(56, 189, 248, 0.13), transparent 32%),
        radial-gradient(circle at 92% 90%, rgba(52, 211, 153, 0.12), transparent 30%),
        var(--bg);
      padding: 16px;
    }

    .shell {
      width: min(1150px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 20%), var(--panel-2);
    }

    .top {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #0a0f1b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top h1 {
      margin: 0;
      font-size: 22px;
    }

    .top p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: #1f2937;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #273449;
    }

    .main {
      padding: 16px;
    }

    .subjects {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .subject-card {
      border: 1px solid var(--border);
      background: #0d1422;
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 8px;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .subject-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 10px 22px rgba(2, 6, 23, 0.28);
    }

    .subject-title {
      margin: 0;
      font-size: 17px;
    }

    .subject-sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .subject-cta {
      margin-top: 4px;
      color: #cfe8ff;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .subject-games {
      display: grid;
      gap: 6px;
    }

    .game-btn {
      text-align: left;
      border: 1px solid var(--border);
      background: #111b2a;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game-btn:hover {
      border-color: var(--accent);
      background: #162338;
    }

    .xp-badge {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      margin-left: 8px;
      letter-spacing: 0.5px;
    }

    .subject-card {
      cursor: pointer;
    }

    .subtopics {
      display: grid;
      gap: 12px;
    }

    .back-button {
      margin-bottom: 16px;
      display: inline-block;
    }

    .subtopic-item {
      border: 1px solid var(--border);
      background: #0d1422;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .subtopic-item:hover {
      border-color: var(--accent);
      background: #111b2a;
    }

    .subtopic-grade {
      background: #38bdf8;
      color: #000;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      margin-left: 12px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 920px) {
      .subjects { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div>
        <h1 id="pageTitle">Middle School Subjects (Grades 5-8)</h1>
        <p id="pageSubtitle">Select a subject, then choose one of its topics.</p>
      </div>
      <div class="top-actions">
        <button type="button" id="backBtn" class="back-button" onclick="goBackToSubjects()" style="display: none;">← Back</button>
        <button type="button" onclick="goDashboard()">◀ Class Selection</button>
        <button type="button" onclick="goProfile()">Profile</button>
      </div>
    </header>

    <main class="main">
      <section id="content"></section>
    </main>
  </div>

  <script>
    let curriculumData = [];
    let currentView = 'subjects';
    let selectedSubject = null;
    const gradeRange = [5, 6, 7, 8];

    async function fetchAllGrades() {
      try {
        // Fetch all grades
        const allGradesData = [];
        for (const grade of gradeRange) {
          const response = await fetch(`http://localhost:5000/api/curriculum/dashboard/${grade}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const result = await response.json();
          allGradesData.push({ grade, data: result.data || [] });
        }
        
        // Combine data from all grades
        const subjectMap = new Map();
        allGradesData.forEach(({ grade, data }) => {
          data.forEach(item => {
            const subjName = item.subject.name;
            if (!subjectMap.has(subjName)) {
              subjectMap.set(subjName, {
                _id: item.subject.id,
                name: subjName,
                learningObjective: item.subject.learningObjective || `Learn ${subjName}`,
                subtopics: [],
                icon: item.subject.icon,
                color: item.subject.color
              });
            }
            // Add subtopics with grade info
            const subject = subjectMap.get(subjName);
            (item.subtopics || []).forEach(topic => {
              subject.subtopics.push({ ...topic, grade });
            });
          });
        });
        
        curriculumData = Array.from(subjectMap.values());
        currentView = 'subjects';
        renderSubjects();
        updateBackButton();
      } catch (error) {
        console.error("Failed to fetch curriculum:", error);
        document.getElementById("content").innerHTML = `<p style="color: #ff6b6b; padding: 20px; font-weight: 600;">⚠️ Error loading curriculum. Ensure backend is running on http://localhost:5000</p>`;
      }
    }

    function renderSubjects() {
      const root = document.getElementById("content");
      
      if (!curriculumData || curriculumData.length === 0) {
        root.innerHTML = "<p style='color: var(--muted); padding: 20px;'>No subjects loaded. Please try again.</p>";
        return;
      }

      root.innerHTML = `<section class="subjects">${curriculumData.map((subject, idx) => {
        const subtopicCount = (subject.subtopics || []).length;
        
        return `
          <article class="subject-card" data-idx="${idx}" onclick="showSubtopics(${idx})">
            <h2 class="subject-title">${subject.name}</h2>
            <p class="subject-sub">${subject.learningObjective || "Explore this subject to learn more."}</p>
            <div class="subject-cta">${subtopicCount} Topics</div>
          </article>
        `;
      }).join("")}</section>`;
    }

    function showSubtopics(subjectIdx) {
      selectedSubject = curriculumData[subjectIdx];
      currentView = 'subtopics';
      const root = document.getElementById("content");
      
      const subtopics = selectedSubject.subtopics || [];
      
      root.innerHTML = `<div class="subtopics">${subtopics.map(topic => `
        <div class="subtopic-item" onclick="startTopic('${topic.id}', '${topic.name}', ${topic.grade})">
          <span>${topic.name}</span>
          <span class="subtopic-grade">Grade ${topic.grade}</span>
        </div>
      `).join("")}</div>`;
      
      // Update title
      document.getElementById("pageTitle").textContent = selectedSubject.name;
      document.getElementById("pageSubtitle").textContent = `${subtopics.length} topics across all grades`;
      
      updateBackButton();
    }

    function goBackToSubjects() {
      currentView = 'subjects';
      selectedSubject = null;
      document.getElementById("pageTitle").textContent = "Middle School Subjects (Grades 5-8)";
      document.getElementById("pageSubtitle").textContent = "Select a subject, then choose one of its topics.";
      renderSubjects();
      updateBackButton();
    }

    function updateBackButton() {
      const backBtn = document.getElementById("backBtn");
      backBtn.style.display = currentView === 'subtopics' ? 'inline-block' : 'none';
    }

    function startTopic(topicId, topicName, grade) {
      sessionStorage.setItem("selectedTopic", JSON.stringify({
        id: topicId,
        name: topicName,
        grade: grade,
        subject: selectedSubject.name
      }));
      // 🎮 Launch infinite runner game
      window.location.href = `/game-infinite-runner.html?topicId=${topicId}`;
    }

    function goDashboard() { window.location.href = "secondary-class-hierarchy.html"; }
    function goProfile() { window.location.href = "/profile.html"; }

    fetchAllGrades();
  </script>
</body>
</html>
